# nginx_b4_heartbeat_alive.conf — B4-FU2 saturation polarity (exporter ALIVE).
#
# Used by: tests/integration/run_b4_heartbeat_stale.sh (Phase A)
#
# Placeholders: @MODULE_PATH@ (test-support .so), @PREFIX@ (sandbox dir).
#
# A deliberately TINY log ring (1k) makes the access-tail ring overflow under
# modest 404 bursts even though the exporter drains every 250 ms — drops occur
# while the exporter is alive and beating.  The heartbeat-stale ALERT must NOT
# appear: saturation must not look like death.

daemon off;
master_process on;
worker_processes 1;
error_log @PREFIX@/logs/error.log info;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-b4-heartbeat-alive;
    otel_metric_interval 1s;
    # Exception-tail export ON (404s push exception-tail records → ring fills).
    otel_log_export on;
    # Tiny ring: overflows between 250 ms drains → ring-full drops with a
    # perfectly healthy exporter (the saturation polarity's trigger).
    otel_log_ring_size 1k;

    server {
        listen 127.0.0.1:9221;
        location / {
            return 200 "ok\n";
        }
        location /missing {
            return 404 "gone\n";
        }
        location /otel_status {
            otel_status_endpoint;
        }
    }
}
