# nginx_traces.conf ‚Äî nginx config for the E2E traces integration test (FU2).
#
# Used by tests/integration/run_traces.sh.
#
# Tests the full span emit‚Üíring‚Üídrain‚Üíencode‚Üí/v1/traces‚Üícollector path.
# The inbound `traceparent` header makes sampling deterministic and lets
# run_traces.sh assert the parentSpanId on the emitted span (proving the
# module extracted and propagated the W3C trace context correctly).
#
# Locations:
#   /       ‚Üí 200 "ok" ‚Äî base requests to build histogram data
#   /error  ‚Üí 500 ‚Äî interesting request; generates tail LogRecord +
#             exemplar + span for cross-signal trace_id match assertion
#
# Placeholders substituted by run_traces.sh:
#   @MODULE_PATH@  ‚Äî absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       ‚Äî absolute path to the sandboxed prefix directory

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318/v1/metrics;
    }
    otel_service_name ngx-otel-traces-test;
    otel_metric_interval 2s;

    # otel_access_log_sample 1: every interesting (non-200) request populates
    # the exemplar reservoir.  With only 1 interesting request (the /error
    # with a known traceparent), the reservoir always holds that trace_id ‚Äî
    # deterministic cross-signal assertion without reservoir eviction risk.
    otel_access_log_sample 1;

    server {
        listen 127.0.0.1:9102;

        # Enable tracing.  The default trace_context mode is "extract":
        # reads the inbound traceparent header, stores trace_id +
        # parent_span_id on SpanCtx, but does NOT inject outbound headers.
        # The SpanCtx.parent_span_id is written as parentSpanId on the
        # emitted span ‚Äî this is what run_traces.sh asserts against.
        otel_trace on;

        location / {
            return 200 "ok\n";
        }

        # /error ‚Üí 500: triggers the is_interesting gate, generating a
        # tail LogRecord (for cross-signal logs.json assertion) and
        # populating the exemplar reservoir (for metrics.json assertion).
        # The span for this request carries the inbound trace_id +
        # parent_span_id from the `traceparent` header.
        location /error {
            return 500 "server error\n";
        }
    }
}
