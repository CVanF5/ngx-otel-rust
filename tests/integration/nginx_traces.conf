# nginx_traces.conf — nginx config for the E2E traces integration test (FU2).
#
# Used by tests/integration/run_traces.sh.
#
# Tests the full span emit→ring→drain→encode→/v1/traces→collector path.
# The inbound `traceparent` header makes sampling deterministic and lets
# run_traces.sh assert the parentSpanId on the emitted span (proving the
# module extracted and propagated the W3C trace context correctly).
#
# Locations:
#   /       → 200 "ok" — base requests to build histogram data
#   /error  → 500 — interesting request; generates tail LogRecord +
#             exemplar + span for cross-signal trace_id match assertion
#
# Placeholders substituted by run_traces.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the sandboxed prefix directory

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-traces-test;
    otel_metric_interval 2s;

    server {
        listen 127.0.0.1:9102;

        # Exemplars are now driven by trace sampling on the metrics path: every
        # sampled request (otel_trace on ⇒ 100% sampled here) writes one exemplar
        # into its base data point's reservoir, carrying the request's trace_id.
        # otel_log_export selects the orthogonal exception-tail log records.
        otel_log_export on;

        # Enable tracing.  The default trace_context mode is "extract":
        # reads the inbound traceparent header, stores trace_id +
        # parent_span_id on SpanCtx, but does NOT inject outbound headers.
        # The SpanCtx.parent_span_id is written as parentSpanId on the
        # emitted span — this is what run_traces.sh asserts against.
        otel_trace on;

        location / {
            return 200 "ok\n";
        }

        # /error → 500: triggers the is_interesting gate, generating a
        # tail LogRecord (for cross-signal logs.json assertion) and
        # populating the exemplar reservoir (for metrics.json assertion).
        # The span for this request carries the inbound trace_id +
        # parent_span_id from the `traceparent` header.
        location /error {
            return 500 "server error\n";
        }

        # /d1_parent_sampled — D1 regression: otel_trace $otel_parent_sampled
        #
        # Pre-fix (D1): traceparent was parsed AFTER Gate 2 evaluated $otel_parent_sampled.
        # SpanCtx was not set at gate time → $otel_parent_sampled returned not_found →
        # gate always declined → no spans ever emitted, regardless of inbound sampling bit.
        #
        # Post-fix: traceparent is parsed BEFORE Gate 2; a pre-gate SpanCtx sets
        # SpanCtx.flags = inbound_flags so $otel_parent_sampled reads the correct W3C bit.
        # Sampled parent (flags=01) → gate passes → span emitted.
        # Unsampled parent (flags=00) → gate declines → no span.
        # No parent → $otel_parent_sampled not_found → gate declines → no span.
        location /d1_parent_sampled {
            otel_trace $otel_parent_sampled;
            return 200 "ok\n";
        }
    }
}
