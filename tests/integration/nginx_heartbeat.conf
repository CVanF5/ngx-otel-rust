# nginx_heartbeat.conf — config for Phase 1.3.3 heartbeat integration test.
#
# Used by: tests/integration/run_exporter_heartbeat.sh
#
# Two placeholders are substituted before the file is written:
#   @MODULE_PATH@  — absolute path to test-support ngx_http_otel_module.so
#   @PREFIX@       — absolute path to the sandboxed prefix directory
#
# The otel_status_endpoint directive is test-support-only; the module at
# @MODULE_PATH@ must be built with the test-support feature (make build
# or the debug profile, which includes test-support by default).

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318/v1/metrics;
    }
    otel_service_name ngx-otel-heartbeat-test;
    otel_metric_interval 1s;

    server {
        listen 127.0.0.1:9201;
        location / {
            return 200 "ok\n";
        }
        location /otel_status {
            otel_status_endpoint;
        }
    }
}
