# nginx_high_rps.conf — nginx config for the high-RPS access-log stress test.
#
# Used by tests/integration/run_logs_high_rps.sh.
#
# Placeholders substituted by run_logs_high_rps.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the sandboxed prefix directory

daemon off;
master_process on;
# 2 workers + exporter process: leaves headroom for the exporter on VMs.
worker_processes 2;
error_log @PREFIX@/logs/error.log notice;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 2048;
}

http {
    access_log off;

    otel_exporter {
        endpoint http://127.0.0.1:4318/v1/metrics;
    }
    otel_service_name ngx-otel-high-rps-test;
    otel_metric_interval 5s;
    otel_access_log on;
    # Large ring (4 MB) so rings don't saturate even at extreme RPS.
    # Memory = 4m × 2 rings × worker_processes = 16 MB total.
    otel_log_ring_size 4m;

    server {
        listen 127.0.0.1:9103;
        location / {
            return 200 "ok\n";
        }
        # healthz endpoint for p99 latency sentinel.
        location /healthz {
            return 200 "ok\n";
        }
    }
}
