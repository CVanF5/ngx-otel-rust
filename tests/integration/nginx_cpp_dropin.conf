# nginx_cpp_dropin.conf — nginx config using C++ nginx-otel directive syntax verbatim.
#
# Used by tests/integration/run_cpp_dropin.sh.
#
# PURPOSE: This config is written in the exact directive syntax that a user of the
# C++ nginx-otel module (https://github.com/nginxinc/nginx-otel) would have.  It
# is loaded UNEDITED to prove that this module accepts those directives without
# modification — the config-level drop-in requirement.
#
# Directives exercised from the C++ module surface:
#   otel_exporter { ... }  — block with sub-directives:
#     endpoint <url>       — collector endpoint
#     header <k> <v>       — exporter HTTP header (C++ sub-directive alias)
#     interval <duration>  — export interval using nginx time syntax (e.g. "5s")
#     batch_size <n>       — accepted and ignored (no equivalent ring knob)
#     batch_count <n>      — accepted and ignored (maps to a fixed constant)
#   otel_service_name      — service.name resource attribute
#   otel_trace on          — enable tracing for all locations in this server
#   otel_trace_context extract — read inbound W3C traceparent header
#   otel_span_name         — override span name via complex value
#   otel_span_attr         — custom span attribute
#
# REFERENCES:
#   C++ nginx-otel directive table: nginx-otel/src/http_module.cpp (gCommands /
#     gExporterCommands); README examples at
#     https://github.com/nginxinc/nginx-otel/blob/main/README.md
#   OTel HTTP semconv (current): https://opentelemetry.io/docs/specs/semconv/http/http-spans/
#
# Placeholders substituted by run_cpp_dropin.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the sandboxed prefix directory

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    # C++ users wire the exporter inside an otel_exporter { } block.
    # The sub-directives `header`, `interval`, `batch_size`, `batch_count`
    # are C++ syntax; this module accepts all of them.
    otel_exporter {
        endpoint http://127.0.0.1:4318;

        # Custom exporter header — C++ sub-directive (alias for otel_exporter_header).
        header X-Dropin-Test present;

        # Export interval in nginx time syntax — C++ sub-directive alias for
        # otel_metric_interval.  "5s" is the C++ default; nginx time grammar
        # accepts this form directly.
        interval 5s;

        # batch_size / batch_count: accepted for C++ config compatibility;
        # this module has a fixed ring size so these are parsed and ignored.
        batch_size 512;
        batch_count 4;
    }

    # Service name resource attribute — identical directive in both modules.
    otel_service_name ngx-otel-cpp-dropin-test;

    server {
        listen 127.0.0.1:9106;

        # Enable tracing — identical to C++ `otel_trace on;`.
        otel_trace on;

        # Extract inbound W3C traceparent — C++ default is "ignore"; explicitly
        # setting "extract" here makes the behaviour explicit and consistent with
        # the C++ config style.
        otel_trace_context extract;

        location / {
            return 200 "ok\n";
        }

        location /api {
            # otel_span_name: override span name via a complex value expression.
            # C++ default is the bare location name (e.g. "/api"); this module's
            # default is "METHOD route" (e.g. "GET /api").  Setting the name
            # explicitly satisfies both behaviours.
            otel_span_name "GET /api";

            # otel_span_attr: add a custom span attribute (key/value pair).
            # C++ supports arbitrary key-value attrs at location scope.
            otel_span_attr app.component "api-handler";

            return 200 "api ok\n";
        }

        location /error {
            return 500 "server error\n";
        }
    }
}
