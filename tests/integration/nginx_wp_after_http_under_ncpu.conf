# nginx_wp_after_http_under_ncpu.conf — A1b positive regression test
#
# "Legal hostile ordering": worker_processes appears AFTER the http{} block
# with a value that is <= ngx_ncpu.  Before A1b, the module would reserve only
# 1 slot (NGX_CONF_UNSET → 1), and check_zone_sizing would refuse to start
# even though the config is perfectly valid.  After A1b, zones are reserved for
# ngx_ncpu slots so this case starts cleanly.
#
# Three placeholders are substituted by run_a1_worker_order.sh:
#   @MODULE_PATH@      — absolute path to libngx_http_otel_module.dylib / .so
#   @PREFIX@           — absolute path to the sandboxed prefix directory
#   @WORKER_PROCESSES@ — worker count to inject (set to ncpu by the script)

daemon off;
master_process on;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-a1b-test;

    server {
        listen 127.0.0.1:9201;
        location / {
            return 200 "ok\n";
        }
    }
}

# A1b: worker_processes <= ngx_ncpu after http{} — must START (not refuse).
worker_processes @WORKER_PROCESSES@;
