# nginx.conf for Step 9 end-to-end integration test.
#
# Used by tests/integration/run.sh.  NGINX is started with this config inside
# a sandboxed prefix directory so it does not interfere with any real NGINX
# instance.
#
# Two placeholders are substituted by run.sh before the file is written:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib / .so
#   @PREFIX@       — absolute path to the sandboxed prefix directory

daemon off;
master_process on;
worker_processes 4;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318/v1/metrics;
    }
    otel_service_name ngx-otel-step9-integration;
    otel_metric_interval 2s;

    server {
        listen 127.0.0.1:9100;
        location / {
            return 200 "ok\n";
        }
    }
}
