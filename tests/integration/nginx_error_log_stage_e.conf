# nginx_error_log_stage_e.conf — Stage E: fixed-default floor proof (FU2)
#
# Proves that bare `otel_error_log;` uses NGX_LOG_ERR as the fixed floor,
# NOT the core `error_log` level (i.e., no mirroring).
#
# Setup:
#   - Core error_log set to NOTICE (below ERR) — if the floor mirrored this,
#     WARN-level messages would pass through to LOGS_LOG.
#   - Bare `otel_error_log;` (NOARGS) → fixed floor = NGX_LOG_ERR.
#   - /warn: proxy to a fake upstream that sends more bytes than Content-Length →
#     generates "upstream sent more data" at NGX_LOG_WARN (5).
#   - /flood: proxy to port 9 (blackhole) → generates "connect() failed" at NGX_LOG_ERR (4).
#
# Assertions in run_error_log.sh:
#   HARD: "upstream sent more data" NOT in LOGS_LOG  (WARN=5 blocked by fixed ERR=4 floor)
#   HARD: "connect() failed"        IS in LOGS_LOG   (ERR=4 passes through ERR=4 floor)
#
# Placeholders:
#   @MODULE_PATH@    — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@         — absolute path to the per-stage sandbox directory
#   @LISTEN_PORT@    — HTTP listen port
#   @FAKE_WARN_PORT@ — port for the nc fake upstream (Content-Length mismatch → WARN)

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log notice;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    proxy_temp_path @PREFIX@/client_body_temp;

    otel_exporter {
        endpoint http://127.0.0.1:4318/v1/metrics;
    }
    otel_service_name ngx-otel-error-log-test;
    otel_metric_interval 2s;

    # NOARGS: fixed default floor = NGX_LOG_ERR (the directive under test).
    # If mirroring were in effect this would be NGX_LOG_NOTICE (6), which
    # would let WARN (5) messages pass through to LOGS_LOG.
    otel_error_log;
    otel_error_log_coalesce on;

    server {
        listen 127.0.0.1:@LISTEN_PORT@;

        # /warn: proxy to fake nc upstream.
        # nc sends Content-Length: 3 but a longer body →
        # nginx logs "upstream sent more data than specified in Content-Length"
        # at NGX_LOG_WARN (5).  With fixed ERR floor (4) this is BLOCKED.
        location /warn {
            proxy_pass http://127.0.0.1:@FAKE_WARN_PORT@;
            proxy_connect_timeout 2s;
            proxy_read_timeout 2s;
        }

        # /flood: proxy to port 9 (reserved/blackhole) →
        # nginx logs "connect() failed" at NGX_LOG_ERR (4), which PASSES through.
        location /flood {
            proxy_pass http://127.0.0.1:9;
            proxy_connect_timeout 1s;
            proxy_read_timeout 1s;
        }
    }
}
