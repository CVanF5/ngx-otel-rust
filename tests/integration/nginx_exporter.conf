# nginx_exporter.conf — minimal config for exporter lifecycle integration tests.
#
# Used by:
#   tests/integration/run_exporter_lifecycle.sh
#   tests/integration/run_exporter_crash_respawn.sh
#
# Two placeholders are substituted before the file is written:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib / .so
#   @PREFIX@       — absolute path to the sandboxed prefix directory
#
# Design: the endpoint is set to 127.0.0.1:4318 as in the standard config.
# The export loop (Worker 0) may fail to connect if the collector is not
# running — that is acceptable for lifecycle tests that only check process
# presence, signal handling, and privilege drop.  The otel_metric_interval is
# set short (1s) so the exporter is actively polling in crash-respawn tests.

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318/v1/metrics;
    }
    otel_service_name ngx-otel-exporter-lifecycle;
    otel_metric_interval 1s;

    server {
        listen 127.0.0.1:9200;
        location / {
            return 200 "ok\n";
        }
    }
}
