# nginx_dualstack_nxdomain.conf — unresolvable-name clean-error test config.
#
# Used by tests/integration/run_dns_dualstack.sh (TEST D — NXDOMAIN clean error).
#
# The dns_stub.py in "nxdomain" mode returns NXDOMAIN for all queries.  This
# config exercises the error path: resolver returns an error → the exporter
# logs a clean connection-failure message, retries, and nginx stays up.
#
# Placeholders substituted by the test script:
#   @MODULE_PATH@    — absolute path to libngx_http_otel_module.{dylib,so}
#   @PREFIX@         — absolute path to the sandboxed prefix directory
#   @DNS_PORT@       — UDP port for the dns_stub.py listener (e.g. 15355)
#   @SERVER_PORT@    — TCP port for nginx's own HTTP listener (e.g. 9213)
#   @DNS_HOSTNAME@   — hostname that will fail to resolve (e.g. ngx-otel-nxdomain-test)

daemon off;
master_process on;
worker_processes 1;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    # Route DNS lookups through dns_stub.py running in "nxdomain" mode.
    resolver 127.0.0.1:@DNS_PORT@ ipv6=off;

    otel_exporter {
        endpoint http://@DNS_HOSTNAME@:4318;
    }
    otel_service_name ngx-otel-dualstack-nxdomain;
    otel_metric_interval 2s;

    server {
        listen 127.0.0.1:@SERVER_PORT@;
        location / {
            return 200 "ok\n";
        }
    }
}
