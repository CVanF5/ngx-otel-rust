# nginx_h2f5_warn.conf — template for run_h2f5_signal_endpoint_warn.sh
#
# Tests that per-signal endpoint directives containing a scheme/host emit
# a WARN during config parse (H2F5 regression guard).
#
# Placeholders substituted by the test script:
#   @MODULE_PATH@   — absolute path to libngx_http_otel_module.{dylib,so}
#   @PREFIX@        — absolute path to the sandboxed prefix directory
#   @METRICS_EP@    — value for metrics_endpoint (URL or path)

daemon off;
master_process off;
worker_processes 1;
# warn level required so NGX_LOG_WARN messages from warn_if_has_authority reach
# the log file during config parse / nginx -t.
error_log @PREFIX@/logs/error.log warn;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 16;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
        metrics_endpoint @METRICS_EP@;
    }

    server {
        listen 127.0.0.1:19200;
        location / { return 200 "ok\n"; }
    }
}
