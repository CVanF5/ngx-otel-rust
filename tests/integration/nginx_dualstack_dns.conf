# nginx_dualstack_dns.conf — DNS-endpoint integration test config.
#
# Used by tests/integration/run_dns_dualstack.sh (TEST A — DNS → v4).
#
# Placeholders substituted by the test script:
#   @MODULE_PATH@    — absolute path to libngx_http_otel_module.{dylib,so}
#   @PREFIX@         — absolute path to the sandboxed prefix directory
#   @DNS_PORT@       — UDP port for the dns_stub.py listener (e.g. 15353)
#   @COLLECTOR_PORT@ — TCP port for the OTLP/HTTP collector (e.g. 4318)
#   @SERVER_PORT@    — TCP port for nginx's own HTTP listener (e.g. 9210)
#   @DNS_HOSTNAME@   — hostname the DNS stub resolves (e.g. ngx-otel-dns-test)

daemon off;
master_process on;
worker_processes 1;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    # Route DNS lookups through the integration test's dns_stub.py.
    # ipv6=off: we are testing the v4 DNS-name path here; v6 is covered by
    # the literal-endpoint sub-test.
    resolver 127.0.0.1:@DNS_PORT@ ipv6=off;

    otel_exporter {
        endpoint http://@DNS_HOSTNAME@:@COLLECTOR_PORT@;
    }
    otel_service_name ngx-otel-dualstack-dns;
    otel_metric_interval 2s;

    server {
        listen 127.0.0.1:@SERVER_PORT@;
        location / {
            return 200 "ok\n";
        }
    }
}
