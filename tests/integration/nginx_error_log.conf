# nginx_error_log.conf — nginx config for the error-log integration test.
#
# Used by tests/integration/run_error_log.sh.
# Exercises coalesced error LogRecords + companion error-rate metric.
#
# Placeholders substituted by run_error_log.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the sandboxed prefix directory
#   @ERROR_LEVEL@  — nginx error_log level (e.g. "debug" for all levels)
#   @OTEL_ERROR_ARGS@ — arguments for otel_error_log directive
#   @COALESCE_FLAG@   — otel_error_log_coalesce on|off
#   @LISTEN_PORT@     — HTTP listen port (e.g. 9103)

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log @ERROR_LEVEL@;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-error-log-test;
    otel_metric_interval 2s;

    # Enable error-log export.
    otel_error_log @OTEL_ERROR_ARGS@;
    otel_error_log_coalesce @COALESCE_FLAG@;

    server {
        listen 127.0.0.1:@LISTEN_PORT@;

        # Location "/" → 200 (no errors fired here).
        location / {
            return 200 "ok\n";
        }

        # Location "/flood" → proxies to an unreachable backend (port 9).
        # Each request generates "connect() failed" errors at warn/error level —
        # this is the flood trigger for coalescing tests.
        location /flood {
            proxy_pass http://127.0.0.1:9;
            proxy_connect_timeout 1s;
            proxy_read_timeout 1s;
        }
    }
}
