# nginx_redirect_safe.conf — H3F1 redirect-safe / single-traceparent E2E test.
#
# Used by tests/integration/run_redirect_safe.sh.
#
# Exercises the three-part H3F1 design:
#   1. r->internal early-return guard (no second span on internal redirect).
#   2. update-don't-append traceparent injection (exactly one outbound header).
#   3. pool-cleanup ctx anchor + recovery (span survives the redirect).
#
# Locations:
#   /proxy  → otel_trace_context propagate; proxy_pass to the header-echo backend.
#             The backend records the request headers it receives — the test
#             asserts EXACTLY ONE `traceparent` reaches it (find-then-update),
#             carrying the inbound trace-id.
#   /redir  → returns 500 which error_page maps to an internal redirect to
#             @recover (a named location).  The request must yield EXACTLY ONE
#             span at the collector (it survives the redirect via the cleanup
#             anchor), with the genuine inbound parent_span_id.
#
# Placeholders substituted by run_redirect_safe.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the sandboxed prefix directory
#   @BACKEND_PORT@ — header-echo backend port

daemon off;
master_process on;
worker_processes 1;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-redirect-test;
    otel_metric_interval 2s;

    server {
        listen 127.0.0.1:9103;

        otel_trace on;
        otel_log_export on;

        # ── Test (a): propagate + proxy → header-echo backend ────────────────
        # propagate = extract inbound traceparent AND inject outbound.  With the
        # H3F1 find-then-update fix the inbound traceparent is overwritten in
        # place, so the backend receives exactly one traceparent (our value,
        # carrying the inbound trace-id).
        location /proxy {
            otel_trace_context propagate;
            proxy_pass http://127.0.0.1:@BACKEND_PORT@;
        }

        # ── Test (b): error_page internal redirect → /recover ───────────────
        # /redir returns 500; error_page maps 500 → /recover (internal redirect,
        # zeroes r->ctx + sets r->internal=1 in ngx_http_internal_redirect,
        # nginx src/http/ngx_http_core_module.c:2614/:2626).  The REWRITE guard
        # prevents a second span-start on the redirected pass; the cleanup-anchor
        # recovery re-installs pass-1's SpanCtx at LOG.  Result: exactly one span,
        # with the genuine inbound parent_span_id.
        #
        # CRITICAL: `return 500;` MUST have NO body.  `return CODE "text"` makes
        # ngx_http_script_return_code (src/http/ngx_http_script.c:1497-1502) call
        # ngx_http_send_response DIRECTLY — the status never reaches
        # ngx_http_special_response_handler, so error_page never fires and NO
        # internal redirect occurs.  Bodyless `return 500;` sets e->status=500
        # (script.c:1504) which propagates to special_response → error_page →
        # ngx_http_internal_redirect.
        location /redir {
            error_page 500 = /recover;
            return 500;
        }

        # @recover sets `otel_trace_context inject` (start a FRESH root trace,
        # ignore inbound).  This makes the r->internal guard's effect DETERMINISTIC
        # and observable at the collector:
        #   • Guard ON (correct): pass-2 span-start early-returns on r->internal,
        #     so @recover's `inject` mode is never reached; LOG recovers pass-1's
        #     SpanCtx (extract mode) → emitted span keeps the inbound trace-id
        #     (cccc…) and parent (dddd…).
        #   • Guard OFF (bug): pass-2 runs span-start in @recover → `inject` starts
        #     a brand-new root trace → the emitted span has a DIFFERENT trace-id
        #     and NO inbound parent.  Both (b1) trace-id-present and (b2)
        #     parent-present assertions then fail — a clean, deterministic signal.
        location /recover {
            internal;
            otel_trace_context inject;
            return 200 "recovered\n";
        }

        # ── Test (c) [H3F9(f)]: DECLINED + redirected → $otel_trace_id empty ──
        # /decline_redir has an inbound traceparent (otel_trace_context extract,
        # so the pre-gate SpanCtx IS allocated to feed Gate 2's
        # $otel_parent_sampled read) BUT Gate 2 DECLINES it: `otel_trace` is set
        # to the empty $http_x_otel_off request header (absent → empty → falsy →
        # decline).  The request then internally redirects (error_page 500 →
        # @decline_recover).
        #
        # H3F9(f) edge: the pre-gate alloc must NOT register a pool-cleanup anchor.
        #   • Fixed (alloc_span_ctx_plain): no anchor → recover_span_ctx finds
        #     nothing on the redirected pass → $otel_trace_id is EMPTY (correct:
        #     the request was declined, no trace).
        #   • Bug (alloc_span_ctx with anchor): the orphaned pre-gate anchor
        #     survives the redirect; recover_span_ctx re-installs the stale ctx →
        #     $otel_trace_id is NON-EMPTY for a declined request.
        # The recover target echoes $otel_trace_id in a response header so the
        # script can assert it is empty.
        location /decline_redir {
            otel_trace_context extract;
            otel_trace $http_x_otel_off;          # absent header → empty → decline
            error_page 500 = /decline_recover;
            return 500;
        }

        location /decline_recover {
            internal;
            add_header X-Otel-Trace-Id "$otel_trace_id" always;
            return 200 "declined-recovered\n";
        }
    }
}
