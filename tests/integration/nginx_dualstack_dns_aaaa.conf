# nginx_dualstack_dns_aaaa.conf — DNS-AAAA-endpoint integration test config.
#
# Used by tests/integration/run_dns_dualstack.sh (TEST C — DNS → v6 via AAAA).
#
# Key difference from nginx_dualstack_dns.conf: the resolver has NO "ipv6=off"
# flag, so nginx issues both A and AAAA queries.  The dns_stub.py in "aaaa"
# mode returns NXDOMAIN for A and the configured IPv6 address for AAAA.
#
# Placeholders substituted by the test script:
#   @MODULE_PATH@    — absolute path to libngx_http_otel_module.{dylib,so}
#   @PREFIX@         — absolute path to the sandboxed prefix directory
#   @DNS_PORT@       — UDP port for the dns_stub.py listener (e.g. 15354)
#   @COLLECTOR_PORT@ — TCP port for the v6 HTTP stub (e.g. 14319)
#   @SERVER_PORT@    — TCP port for nginx's own HTTP listener (e.g. 9212)
#   @DNS_HOSTNAME@   — hostname the DNS stub resolves (e.g. ngx-otel-dns-aaaa)

daemon off;
master_process on;
worker_processes 1;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    # Route DNS lookups through dns_stub.py running in "aaaa" mode.
    # No "ipv6=off" — nginx must issue AAAA queries so the stub can return ::1.
    resolver 127.0.0.1:@DNS_PORT@;

    otel_exporter {
        endpoint http://@DNS_HOSTNAME@:@COLLECTOR_PORT@;
    }
    otel_service_name ngx-otel-dualstack-aaaa;
    otel_metric_interval 2s;

    server {
        listen 127.0.0.1:@SERVER_PORT@;
        location / {
            return 200 "ok\n";
        }
    }
}
