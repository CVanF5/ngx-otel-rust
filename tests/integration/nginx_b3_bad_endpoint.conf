# nginx_b3_bad_endpoint.conf — B3 regression: export_loop startup-abort path
#
# Used by: tests/integration/run_b3_quit_hang.sh
#
# Two placeholders are substituted before the file is written:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib / .so
#   @PREFIX@       — absolute path to the sandboxed prefix directory
#
# Design: the endpoint uses an invalid scheme ("nothttp://") that causes the
# HTTP transport constructor to fail during export_loop startup → export_loop
# returns early without ever establishing a collector connection.  With no
# active fds or other timers, the pre-fix drain-wait loop in
# otel_exporter_cycle would block in ngx_process_events_and_timers forever
# after `nginx -s quit`.
#
# B3 fix ensures that:
#   (1) ExportLoopDoneGuard sets EXPORT_LOOP_DONE even on the early-return path.
#   (2) The backstop timer causes ngx_process_events_and_timers to return by
#       GRACEFUL_DRAIN_BACKSTOP (15 s), and then the drain-wait loop exits.
# Together these make nginx -s quit complete within the backstop window.

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        # Deliberately invalid scheme — triggers HTTP transport construction
        # failure inside export_loop, causing an early return (B3 abort path).
        endpoint nothttp://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-b3-quit-hang;
    otel_metric_interval 1s;

    server {
        listen 127.0.0.1:9202;
        location / {
            return 200 "ok\n";
        }
    }
}
