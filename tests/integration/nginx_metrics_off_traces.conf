# nginx_metrics_off_traces.conf — nginx config for the otel_metrics off + traces test.
#
# Used by tests/integration/run_metrics_off_traces.sh.
#
# Verifies that `otel_metrics off` suppresses metrics but leaves traces and
# access-log tails fully operational.  This config is intentionally identical
# to nginx_traces.conf except for the `otel_metrics off` directive, so that
# a diff between the two configs pinpoints the only change under test.
#
# Placeholders substituted by run_metrics_off_traces.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the sandboxed prefix directory

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-metrics-off-traces-test;
    otel_metric_interval 2s;

    # Suppress metrics export while keeping traces and access-log tails active.
    otel_metrics off;

    server {
        listen 127.0.0.1:9105;

        otel_log_export on;
        otel_trace on;

        location / {
            return 200 "ok\n";
        }

        location /error {
            return 500 "server error\n";
        }
    }
}
