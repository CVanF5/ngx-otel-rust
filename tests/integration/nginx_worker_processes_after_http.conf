# nginx_worker_processes_after_http.conf — worker-processes-after-http residual-error test
#
# "Hostile ordering": worker_processes appears AFTER the http{} block with a
# value that EXCEEDS ngx_ncpu.  The module sizes zones at postconfiguration
# for ngx_ncpu slots (ncpu-headroom instead of 1), so when
# check_zone_sizing runs in init_module and finds actual_workers > ngx_ncpu it
# refuses to start with a clear error rather than letting workers write past
# the zone end.
#
# Three placeholders are substituted by run_worker_order.sh:
#   @MODULE_PATH@      — absolute path to libngx_http_otel_module.dylib / .so
#   @PREFIX@           — absolute path to the sandboxed prefix directory
#   @WORKER_PROCESSES@ — worker count to inject (set to ncpu+1 by the script)

daemon off;
master_process on;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-worker-order-test;

    server {
        listen 127.0.0.1:9199;
        location / {
            return 200 "ok\n";
        }
    }
}

# HOSTILE ORDERING: worker_processes appears AFTER http{}.
# At postconfiguration time, worker_processes is still NGX_CONF_UNSET (-1),
# so zones are reserved for ngx_ncpu slots (ncpu-headroom fix).  Using ncpu+1 here ensures
# init_module detects actual_workers > reserved and refuses to start.
worker_processes @WORKER_PROCESSES@;
