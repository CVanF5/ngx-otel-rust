# nginx_worker_processes_after_http.conf — A1 regression test
#
# This is the "hostile ordering" config: worker_processes appears AFTER the
# http{} block.  This is valid nginx syntax but causes the otel module's
# postconfiguration to see NGX_CONF_UNSET (-1) for worker_processes and size
# all shm zones for 1 worker instead of 4.
#
# The A1 fix in ngx_otel_init_module must detect this mismatch and refuse to
# start with a clear error message, rather than letting workers 1-3 write
# past the zone end and corrupt adjacent memory.
#
# Two placeholders are substituted by run_a1_worker_order.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib / .so
#   @PREFIX@       — absolute path to the sandboxed prefix directory

daemon off;
master_process on;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-a1-test;

    server {
        listen 127.0.0.1:9199;
        location / {
            return 200 "ok\n";
        }
    }
}

# HOSTILE ORDERING: worker_processes appears AFTER http{}.
# At postconfiguration time, worker_processes is still NGX_CONF_UNSET (-1),
# so zones get sized for 1 worker.  The A1 fix must catch this in init_module.
worker_processes 4;
