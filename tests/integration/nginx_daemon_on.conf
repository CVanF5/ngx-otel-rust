# nginx_daemon_on.conf — config for the B4 daemon-on gen-1 supervision test.
#
# Used by: tests/integration/run_b4_daemon_on_gen1.sh
#
# Key difference from nginx_exporter.conf: `daemon on` (the production default).
# This causes nginx to double-fork on startup: the pre-daemon spawner forks the
# master and exits, orphaning the gen-1 exporter to init (PPID 1).
# The test verifies:
#   1. The ALERT about gen-1 supervision is logged at startup.
#   2. kill -9 gen-1 exporter → NO respawn (master cannot see the SIGCHLD).
#   3. nginx -s reload → gen-2 exporter spawned by the long-lived master.
#   4. kill -9 gen-2 exporter → IS respawned within 5 s (master owns gen-2).
#
# Placeholders substituted before writing:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib / .so
#   @PREFIX@       — absolute path to the sandboxed prefix directory

daemon on;
master_process on;
worker_processes 1;
error_log @PREFIX@/logs/error.log debug;
pid @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 1024;
}

http {
    otel_exporter {
        endpoint 127.0.0.1:4318;
    }

    otel_metric_interval 1s;

    server {
        listen 9200;
        location / {
            otel_trace off;
            return 200 "ok\n";
        }
    }
}
