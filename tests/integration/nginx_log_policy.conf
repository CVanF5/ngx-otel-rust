# nginx_log_policy.conf — nginx config for the log-policy integration test.
#
# Used by tests/integration/run_log_policy.sh.
# Tests privacy default, on/off directive forms, and exemplar gating.
#
# Port layout (all on localhost to avoid collisions with run_access_log.sh):
#   9111  Privacy-default server — NO otel_log_export anywhere.
#         Histogram is always-on; zero tail LogRecords expected.
#   9112  Log-on server — otel_log_export on at server level.
#         All requests produce tail LogRecords.
#         Location /no-export overrides with otel_log_export off.
#   9113  Exemplar server — otel_trace on → exemplar present; used to verify
#         exemplars carry trace_id only (no url.path/user_agent).
#         otel_trace off location → no exemplar.
#
# Placeholders substituted by run_log_policy.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the sandboxed prefix directory

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-log-policy-test;
    otel_metric_interval 2s;

    # ── Port 9111: privacy-default server ────────────────────────────────────
    # No otel_log_export anywhere in this server. Privacy default: zero tail
    # LogRecords. The request-duration histogram is still emitted (always-on).
    server {
        listen 127.0.0.1:9111;

        location / {
            return 200 "privacy-default\n";
        }
        location /error {
            return 500 "error\n";
        }
    }

    # ── Port 9112: on / off forms ─────────────────────────────────────────────
    # otel_log_export on at server level exports every request's tail record.
    # Location /no-export sets otel_log_export off, overriding the server level.
    server {
        listen 127.0.0.1:9112;

        otel_log_export on;

        location / {
            return 200 "exported\n";
        }

        # This location disables log export — its requests must produce no tail
        # records even though the parent server block has otel_log_export on.
        location /no-export {
            otel_log_export off;
            return 200 "not-exported\n";
        }
    }

    # ── Port 9113: exemplar gating by trace sampling ──────────────────────────
    # otel_trace on at server level → every request is sampled → exemplars land
    # in the per-data-point reservoir carrying the request's trace_id.
    # Location /no-trace sets otel_trace off so those requests produce no
    # exemplar (they are not sampled → nothing written to the reservoir).
    server {
        listen 127.0.0.1:9113;

        otel_log_export on;
        otel_trace on;

        location / {
            return 200 "traced\n";
        }

        # Tracing disabled → no span emitted → no exemplar written for this
        # location's requests, even with otel_log_export on.
        location /no-trace {
            otel_trace off;
            return 200 "untraced\n";
        }
    }
}
