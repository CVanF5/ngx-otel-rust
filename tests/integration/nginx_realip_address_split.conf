# nginx_realip_address_split.conf — nginx config for the realip address split test.
#
# Used by tests/integration/run_realip_address_split.sh.
#
# PURPOSE: Verifies that `client.address` (realip-aware logical client) and
# `network.peer.address` (true TCP socket peer) are sourced correctly — they must
# diverge when the realip module rewrites the client address, and they must agree
# when realip is not active.
#
# Two servers on distinct ports:
#
#   Port 9107 — realip ON:
#     set_real_ip_from 127.0.0.1;    trust requests from localhost
#     real_ip_header X-Forwarded-For; rewrite client address from the XFF header
#
#     With these directives active, a request from localhost carrying
#     "X-Forwarded-For: 203.0.113.7" causes nginx to rewrite its internal
#     client-address to 203.0.113.7 before request processing.  The OTel module
#     then reads:
#       client.address  = 203.0.113.7  (realip-rewritten)
#       network.peer.address = 127.0.0.1  (true socket peer, saved by realip before overwrite)
#
#   Port 9108 — realip OFF (control, no realip directives):
#     Same request carries the same XFF header, but realip is not configured.
#     The OTel module reads:
#       client.address  = 127.0.0.1  (live $remote_addr — the socket peer)
#       network.peer.address = 127.0.0.1  (same source — no realip active)
#
# REFERENCE:
#   nginx realip module: https://nginx.org/en/docs/http/ngx_http_realip_module.html
#   OTel semconv client.address / network.peer.address:
#     https://opentelemetry.io/docs/specs/semconv/attributes-registry/client/
#     https://opentelemetry.io/docs/specs/semconv/attributes-registry/network/
#
# Placeholders substituted by run_realip_address_split.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the sandboxed prefix directory

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-realip-test;
    otel_metric_interval 2s;

    # ── Server A: realip ENABLED ──────────────────────────────────────────────
    # set_real_ip_from trusts our own localhost so the XFF header is honoured.
    # real_ip_header names the header that carries the original client IP.
    server {
        listen 127.0.0.1:9107;

        set_real_ip_from 127.0.0.1;
        real_ip_header X-Forwarded-For;

        otel_trace on;
        otel_trace_context extract;

        location / {
            return 200 "realip-on\n";
        }
    }

    # ── Server B: realip DISABLED (control) ──────────────────────────────────
    # No realip directives; the XFF header is ignored.  client.address and
    # network.peer.address both reflect the true socket peer (127.0.0.1).
    server {
        listen 127.0.0.1:9108;

        otel_trace on;
        otel_trace_context extract;

        location / {
            return 200 "realip-off\n";
        }
    }
}
