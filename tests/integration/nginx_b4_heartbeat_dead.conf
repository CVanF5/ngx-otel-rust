# nginx_b4_heartbeat_dead.conf — B4-FU2 death polarity (silent exporter death).
#
# Used by: tests/integration/run_b4_heartbeat_stale.sh (Phase B)
#
# Placeholders: @MODULE_PATH@ (test-support .so), @PREFIX@ (sandbox dir).
#
# daemon on = the REAL B4 scenario: the gen-1 exporter is spawned pre-daemonize
# (PPID becomes init), so kill -9 produces a SILENT death — the master never
# sees SIGCHLD and never respawns.  Beats stop permanently; workers must emit
# exactly ONE latched heartbeat-stale ALERT on the ring-full drop path.

daemon on;
master_process on;
worker_processes 1;
error_log @PREFIX@/logs/error.log info;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-b4-heartbeat-dead;
    otel_metric_interval 1s;
    otel_access_log_sample 16;
    # Tiny ring: fills within one 404 burst once the dead exporter stops
    # draining → ring-full drops trigger the liveness check.
    otel_log_ring_size 1k;

    server {
        listen 127.0.0.1:9222;
        location / {
            return 200 "ok\n";
        }
        location /missing {
            return 404 "gone\n";
        }
        location /otel_status {
            otel_status_endpoint;
        }
    }
}
