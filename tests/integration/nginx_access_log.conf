# nginx_access_log.conf — nginx config for the access-log integration test.
#
# Used by tests/integration/run_access_log.sh.
# FU4 additions:
#   - upstream block with zone for per-upstream histogram testing
#   - /api location proxies to the upstream (tests nginx.upstream.zone attr)
#   - /error returns 500 (tests exception tail + traceparent + url.path)
#
# Placeholders substituted by run_access_log.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the sandboxed prefix directory

daemon off;
master_process on;
worker_processes 2;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-access-log-test;
    otel_metric_interval 2s;

    # Phase 2.2 DP-D: enable exception-tail + exemplar reservoir (size 16).
    otel_access_log_sample 16;

    # FU4: an upstream with a zone name for nginx.upstream.zone testing.
    # The upstream intentionally has no live servers (connect fails → 502),
    # but the upstream config is registered so the zone name appears in metrics.
    upstream test_backend {
        zone test_backend_zone 1m;
        server 127.0.0.1:19999;  # no server here → connect fail → 502 (interesting)
    }

    server {
        listen 127.0.0.1:9101;

        # Phase 3.5 S3: enable tracing for all locations in this server block.
        # Allows span_start.rs REWRITE handler to run and extract the inbound
        # traceparent header into SpanCtx.  The default trace_context is
        # "extract" (read inbound, do not inject outbound) — no explicit
        # otel_trace_context directive required.
        # FU4a: this is what makes the traceparent→exemplar and
        # traceparent→LogRecord assertions pass in S5.
        otel_trace on;

        # Location "/" → 200, no upstream (tests base + route histogram)
        location / {
            return 200 "ok\n";
        }

        # Location "/error" → 500 (tests exception-tail + url.path)
        location /error {
            return 500 "server error\n";
        }

        # Location "/api" → proxy to upstream (tests nginx.upstream.zone)
        # Will produce 502 Bad Gateway (interesting) due to no live backend.
        location /api {
            proxy_pass http://test_backend;
            proxy_connect_timeout 1s;
        }

        # Regex location → NOT in the static location tree that build_route_table
        # walks, so its requests are unregistered and map to the "(other)" route
        # bucket. Tests the route overflow/unregistered path (DP-E "other").
        location ~ ^/regex-unmapped {
            return 200 "regex\n";
        }
    }
}
