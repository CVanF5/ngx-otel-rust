# nginx_dualstack_v6.conf — IPv6-literal-endpoint integration test config.
#
# Used by tests/integration/run_dns_dualstack.sh (TEST B — IPv6 literal).
#
# Placeholders substituted by the test script:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.{dylib,so}
#   @PREFIX@       — absolute path to the sandboxed prefix directory
#   @V6_PORT@      — TCP port for the v6_http_stub.py listener (e.g. 14318)
#   @SERVER_PORT@  — TCP port for nginx's own HTTP listener (e.g. 9211)

daemon off;
master_process on;
worker_processes 1;
error_log @PREFIX@/logs/error.log debug;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 64;
}

http {
    otel_exporter {
        # Literal IPv6 loopback endpoint — no resolver needed.
        endpoint http://[::1]:@V6_PORT@;
    }
    otel_service_name ngx-otel-dualstack-v6;
    otel_metric_interval 2s;

    server {
        listen 127.0.0.1:@SERVER_PORT@;
        location / {
            return 200 "ok\n";
        }
    }
}
