# nginx_logs_td.conf — Treatment D: flood-cost error-log writer
#
# Used by tests/bench/zero_cost_logs.sh (error-log bench extension).
# `otel_error_log warn` is configured AND the wrk workload targets "/flood"
# which proxies to an unreachable backend (port 9).  Every request generates
# "connect() failed" error log entries — the writer fires on every request.
# Measures the flood-cost overhead: severity floor pass → coalescer count-bump
# → error-rate metric bump per request (ring push only on novel templates).
#
# Note: wrk aborts with non-zero exit when all requests receive 502; this is
# expected and handled by the bench script.  RPS is still measured via the
# wrk output even when the status code is an error.
#
# Placeholders substituted by zero_cost_logs.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the per-run sandbox directory
#
# wrk endpoint: http://127.0.0.1:9103/flood (different port to avoid conflict)

daemon off;
master_process on;
worker_processes 4;
error_log @PREFIX@/logs/error.log warn;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 1024;
}

http {
    access_log off;

    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-logs-bench-td;
    otel_metric_interval 10s;

    # error-log writer active; flood generates errors on every request.
    otel_error_log warn;
    otel_error_log_coalesce on;

    # Unreachable upstream (port 9 is reserved, always fails to connect).
    upstream flood_backend {
        server 127.0.0.1:9;
    }

    server {
        listen 127.0.0.1:9103;
        location / {
            return 200 "ok\n";
        }
        location /flood {
            proxy_pass http://flood_backend;
            proxy_connect_timeout 1s;
            proxy_read_timeout 1s;
        }
    }
}
