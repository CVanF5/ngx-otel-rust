# nginx_c2.conf — Config 2: module loaded but NOT configured
#
# load_module is present so the module is loaded and its hooks are
# registered, but NO otel_exporter block is present.  This is the
# "zero-cost when disabled" case: the phase handler must NOT be
# registered and the export task must NOT be spawned.
#
# The benchmark asserts that this config is statistically
# indistinguishable from C1 (< 3% difference on latency and throughput).
#
# Two placeholders substituted by zero_cost.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib / .so
#   @PREFIX@       — absolute path to the per-run sandbox directory
#
# wrk endpoint: http://127.0.0.1:9101/

daemon off;
master_process on;
worker_processes 4;
error_log @PREFIX@/logs/error.log notice;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 1024;
}

http {
    server {
        listen 127.0.0.1:9101;
        location / {
            return 200 "ok\n";
        }
    }
}
