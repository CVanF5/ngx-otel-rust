# 24h soak — every telemetry feature on, OTLP/gRPC transport.
# Exercises: metrics (all histograms + exemplars), access-log exception tail +
# exemplar reservoir (Phase 2.2), error-log writer + coalescing (Phase 2.3),
# resource attributes. Load mix (mix.lua) drives 200s (metrics+exemplars),
# 4xx/5xx (access exception tail), and dead-upstream proxies (error-log events;
# three distinct upstreams so coalescing still yields visible verbatim samples).
daemon off;
master_process on;
worker_processes 4;
worker_rlimit_nofile 16384;
# notice level so the one-shot "export loop started ... protocol=otlp_grpc" line
# is captured (recurring success lines are INFO, suppressed here).
error_log /home/admin/soak/logs/error.log notice;
pid       /home/admin/soak/logs/nginx.pid;

load_module /home/admin/project-nginx-otel/ngx-otel-rust/objs-release/ngx_http_otel_module.so;

events {
    worker_connections 8192;
}

http {
    access_log off;                     # nginx's own access log off; OTel is orthogonal

    otel_exporter {
        endpoint http://127.0.0.1:4317; # OTLP/gRPC origin (h2c), no path
    }
    otel_export_protocol otlp_grpc;
    otel_service_name ngx-otel-soak-grpc;
    otel_metric_interval 5s;
    otel_resource_attr deployment.environment soak;
    otel_resource_attr host.name host-1-c7a;

    # Phase 2.2 — access exemplar reservoir + thin exception tail (sampling on).
    otel_access_log_sample 256;
    otel_log_ring_size 1m;

    # Phase 2.3 — error-log writer + producer-side coalescing.
    otel_error_log warn;
    otel_error_log_coalesce on;

    # Always-failing upstreams (closed ports) → distinct "connect() failed"
    # templates so the coalescer emits several verbatim samples (not just one).
    upstream dead_a { server 127.0.0.1:9; }
    upstream dead_b { server 127.0.0.1:1; }
    upstream dead_c { server 127.0.0.1:9999; }

    server {
        listen 127.0.0.1:9200;

        location /         { return 200 "ok\n"; }     # 200 → metrics + exemplars
        location /notfound { return 404 "nf\n"; }      # 404 → access exception tail
        location /fail     { return 500 "boom\n"; }    # 500 → access exception tail
        location /flood    { proxy_pass http://dead_a; proxy_connect_timeout 1s; proxy_read_timeout 1s; }
        location /flood2   { proxy_pass http://dead_b; proxy_connect_timeout 1s; proxy_read_timeout 1s; }
        location /flood3   { proxy_pass http://dead_c; proxy_connect_timeout 1s; proxy_read_timeout 1s; }
    }
}
