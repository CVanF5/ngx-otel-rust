# nginx_logs_tb.conf — Treatment B: same as Treatment A but used for high-RPS run
#
# Identical to nginx_logs_ta.conf.  In zero_cost_logs.sh, Treatment B uses
# more wrk connections to stress the ring at higher throughput, measuring the
# bounded cost of active access-log emission (informational).
#
# Placeholders substituted by zero_cost_logs.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the per-run sandbox directory

daemon off;
master_process on;
worker_processes 4;
error_log @PREFIX@/logs/error.log notice;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 1024;
}

http {
    access_log off;

    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-logs-bench-tb;
    otel_metric_interval 10s;
    otel_log_export on;

    server {
        listen 127.0.0.1:9102;
        location / {
            return 200 "ok\n";
        }
    }
}
