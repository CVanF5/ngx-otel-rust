# nginx_c3.conf — Config 3: module loaded AND configured
#
# load_module is present and an otel_exporter block points at the local
# OTel collector.  This is the operational case.  The benchmark reports
# the overhead of C3 vs C1 as the per-request cost of telemetry.
#
# The operator must ensure the local collector is running at
# http://127.0.0.1:4318/v1/metrics before running the benchmark.
# The harness will detect a missing collector and exit with an error.
#
# Three placeholders substituted by zero_cost.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib / .so
#   @PREFIX@       — absolute path to the per-run sandbox directory
#
# wrk endpoint: http://127.0.0.1:9101/

daemon off;
master_process on;
worker_processes 4;
error_log @PREFIX@/logs/error.log notice;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 1024;
}

http {
    # Keep logging I/O out of the measured path (see RESULTS.md re: tmpfs jitter).
    access_log off;

    otel_exporter {
        endpoint http://127.0.0.1:4318/v1/metrics;
    }
    otel_service_name ngx-otel-step11-bench;
    otel_metric_interval 10s;

    server {
        listen 127.0.0.1:9101;
        location / {
            return 200 "ok\n";
        }
    }
}
