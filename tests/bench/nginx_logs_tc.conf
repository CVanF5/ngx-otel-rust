# nginx_logs_tc.conf — Treatment C: idle error-log writer (Phase 2.3 §6.6.2)
#
# Used by tests/bench/zero_cost_logs.sh (extended for Step 2.3.8).
# `otel_error_log warn` is configured but the wrk workload serves only 200s
# on "/" — no errors are generated.  The writer is in the chain but never
# fires.  Measures the idle-writer cost of the Phase 2.3 instrumentation.
#
# This is the common-case prod scenario: error log wired, no errors flying.
# The zero-cost claim for Treatment C is the strongest: the writer should be
# strictly absent from the hot path (process-role guard returns early before
# any atomic ops; the ring and coalescer are never touched).
#
# Placeholders substituted by zero_cost_logs.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the per-run sandbox directory
#
# wrk endpoint: http://127.0.0.1:9102/

daemon off;
master_process on;
worker_processes 4;
error_log @PREFIX@/logs/error.log notice;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 1024;
}

http {
    access_log off;

    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-logs-bench-tc;
    otel_metric_interval 10s;

    # Phase 2.3: error-log writer wired but no errors generated by "/" → 200.
    otel_error_log warn;
    otel_error_log_coalesce on;

    server {
        listen 127.0.0.1:9102;
        location / {
            return 200 "ok\n";
        }
    }
}
