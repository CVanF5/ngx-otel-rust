# nginx_logs_bl.conf — Baseline: module loaded + otel_exporter, access log OFF
#
# Used by tests/bench/zero_cost_logs.sh as the zero-cost reference point.
# This config has otel_exporter configured but otel_access_log_sample is NOT set
# (defaults to off). Every request goes through the log-phase handler but
# the `if amcf.is_access_sample_enabled()` branch is always false — zero
# per-request ring writes.
#
# Placeholders substituted by zero_cost_logs.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the per-run sandbox directory
#
# wrk endpoint: http://127.0.0.1:9102/

daemon off;
master_process on;
worker_processes 4;
error_log @PREFIX@/logs/error.log notice;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 1024;
}

http {
    access_log off;

    otel_exporter {
        endpoint http://127.0.0.1:4318;
    }
    otel_service_name ngx-otel-logs-bench-bl;
    otel_metric_interval 10s;
    # otel_access_log_sample is NOT set (default: off)

    server {
        listen 127.0.0.1:9102;
        location / {
            return 200 "ok\n";
        }
    }
}
