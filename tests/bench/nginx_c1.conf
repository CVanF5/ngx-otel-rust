# nginx_c1.conf — Config 1: true baseline
#
# NO load_module directive.  The otel module is not loaded at all.
# This is the reference point for the zero-cost-when-disabled benchmark.
#
# Two placeholders substituted by zero_cost.sh:
#   @PREFIX@  — absolute path to the per-run sandbox directory
#
# wrk endpoint: http://127.0.0.1:9101/

daemon off;
master_process on;
worker_processes 4;
error_log @PREFIX@/logs/error.log notice;
pid       @PREFIX@/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Keep logging I/O out of the measured path (see RESULTS.md re: tmpfs jitter).
    access_log off;

    server {
        listen 127.0.0.1:9101;
        location / {
            return 200 "ok\n";
        }
    }
}
