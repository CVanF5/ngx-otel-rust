# nginx_logs_ta.conf — Treatment A: module loaded + otel_exporter + otel_access_log on
#
# Used by tests/bench/zero_cost_logs.sh.
# `otel_access_log on` is configured; every request emits a record into
# the per-worker ring.  This measures the actual per-request cost of
# access-log emission.  The critical claim: Treatment A vs Baseline < 2%.
#
# Note: "Treatment A" in the plan describes `otel_access_log on` with
# `is_access_log_enabled() = true`; the hot-path ring write executes on
# every request.
#
# Placeholders substituted by zero_cost_logs.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the per-run sandbox directory
#
# wrk endpoint: http://127.0.0.1:9102/

daemon off;
master_process on;
worker_processes 4;
error_log @PREFIX@/logs/error.log notice;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 1024;
}

http {
    access_log off;

    otel_exporter {
        endpoint http://127.0.0.1:4318/v1/metrics;
    }
    otel_service_name ngx-otel-logs-bench-ta;
    otel_metric_interval 10s;
    otel_access_log on;

    server {
        listen 127.0.0.1:9102;
        location / {
            return 200 "ok\n";
        }
    }
}
