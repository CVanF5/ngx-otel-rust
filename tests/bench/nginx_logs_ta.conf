# nginx_logs_ta.conf — Treatment A: module loaded + otel_exporter + otel_access_log_sample on
#
# Used by tests/bench/zero_cost_logs.sh.
# `otel_access_log_sample 16` is configured; only interesting requests (errors /
# latency outliers) push a tail record.  The histogram bump is always-on.
# Treatment A measures the rebalanced enabled hot-path cost vs Baseline.
#
# Placeholders substituted by zero_cost_logs.sh:
#   @MODULE_PATH@  — absolute path to libngx_http_otel_module.dylib/.so
#   @PREFIX@       — absolute path to the per-run sandbox directory
#
# wrk endpoint: http://127.0.0.1:9102/

daemon off;
master_process on;
worker_processes 4;
error_log @PREFIX@/logs/error.log notice;
pid       @PREFIX@/logs/nginx.pid;

load_module @MODULE_PATH@;

events {
    worker_connections 1024;
}

http {
    access_log off;

    otel_exporter {
        endpoint http://127.0.0.1:4318/v1/metrics;
    }
    otel_service_name ngx-otel-logs-bench-ta;
    otel_metric_interval 10s;
    otel_access_log_sample 16;

    server {
        listen 127.0.0.1:9102;
        location / {
            return 200 "ok\n";
        }
    }
}
