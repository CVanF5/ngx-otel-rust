# otel-collector-demo.yaml — collector config for the Grafana demo stack.
#
# Superset of test-harness/otel-collector-config.yaml: keeps the debug
# exporter (so you can still tail raw OTLP), drops the file exporter (the
# demo doesn't assert on metrics.json), and ADDS a Prometheus exporter
# that Grafana visualises via a Prometheus datasource.
#
# Metric-shape notes specific to ngx-otel-rust (see demo/README.md §"How
# the metrics map"):
#   * The module emits *every* metric as an OTLP Histogram — including the
#     stub_status counters/gauges, which are single-bucket histograms
#     (count=1, sum=value). Per-request metrics use CUMULATIVE temporality
#     with a fixed start_time_unix_nano anchored to the exporter start.
#   * `add_metric_suffixes: false` keeps Prometheus names a predictable
#     dotted→underscore mapping (e.g. http.server.request.duration ->
#     http_server_request_duration) with NO unit/type suffix, so the
#     provisioned dashboard queries are stable.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # Raw OTLP dump in the collector logs — handy when demoing the pipeline.
  debug:
    verbosity: normal

  # Push metrics to Prometheus via remote-write (NOT scrape). This is the
  # canonical OTLP→Prometheus path for EXPONENTIAL histograms: the module's
  # request.duration{,.by_route,.by_upstream} are exp-histograms, which the
  # classic scrape exporter can only render as a single le="+Inf" bucket (it
  # also DROPS the exemplars). Remote-write carries the exp-histograms as
  # Prometheus NATIVE histograms AND ships their EXEMPLARS (trace_id + url.path,
  # Phase 2.2.4), so Grafana can overlay exemplar diamonds and drill to the
  # Loki tail log. Pairs with Prometheus --web.enable-remote-write-receiver +
  # --enable-feature=native-histograms,exemplar-storage.
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    # Predictable metric names (matches the dashboard queries): no unit suffixes.
    add_metric_suffixes: false
    # Promote resource attributes (service.name, etc.) to series labels.
    resource_to_telemetry_conversion:
      enabled: true

  # ── Logs (Phase 2) ────────────────────────────────────────────────────
  # Ship the module's OTLP logs (access exception tail + coalesced error log)
  # straight to Loki's native OTLP endpoint — no Promtail, no format
  # translation. Loki promotes service.name -> the `service_name` index label
  # and keeps per-record attributes (url.path -> url_path, etc.) as structured
  # metadata, which the dashboard's LogQL filters on.
  otlphttp/loki:
    logs_endpoint: http://loki:3100/otlp/v1/logs
    tls:
      insecure: true

  # ── Traces (Phase 3) — ship nginx server spans to Tempo ───────────────
  # Enabled when the `traces` compose profile is active (starts Tempo).
  # The module sends spans to /v1/traces (OTLP/HTTP) or the gRPC endpoint;
  # this exporter forwards them to Tempo's internal OTLP/gRPC receiver.
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheusremotewrite, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki, debug]
    # ── Traces (Phase 3): nginx server spans → Tempo ───────────────────
    # Tempo is started by `--profile traces`; the otlp/tempo exporter is
    # always declared but only reachable when Tempo is running.  If Tempo
    # is down, the collector logs an export error and retries — the rest
    # of the pipeline (metrics, logs) is unaffected.
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, debug]
