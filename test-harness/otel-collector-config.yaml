receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # Print everything received in collector logs
  debug:
    verbosity: detailed
    sampling_initial: 100
    sampling_thereafter: 100

  # Also write to a JSON file we can inspect after a test run
  file:
    path: /var/log/otel/metrics.json
    rotation:
      max_megabytes: 10
      max_days: 1
      max_backups: 3

service:
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, file]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, file]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, file]
