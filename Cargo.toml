[package]
name = "ngx-otel-rust"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
publish = false
rust-version = "1.81.0"

[lib]
name = "ngx_http_otel_module"
crate-type = ["cdylib"]

[dependencies]
bytes = "1.10.1"
http = "1.4.0"
http-body = "1.0.1"
http-body-util = "0.1.3"
hyper = { version = "1.6.0", default-features = false, features = ["client", "http1"] }
libc = "0.2.174"
nginx-sys = { git = "https://github.com/nginx/ngx-rust.git", rev = "13c0067" }
ngx = { git = "https://github.com/nginx/ngx-rust.git", rev = "13c0067", features = ["async", "std"] }
openssl-sys = { version = "0.9.110", features = ["bindgen"] }
pin-project-lite = "0.2.16"
prost = "0.13"
thiserror = { version = "2.0.12", default-features = false }

[build-dependencies]
prost-build = "0.13"

[features]
default = ["export-modules"]
# Generate `ngx_modules` table with module exports
# The exports table is required for building loadable modules with --crate-type cdylib
# outside of the NGINX buildsystem.
export-modules = []

[profile.release]
codegen-units = 1
lto = true
