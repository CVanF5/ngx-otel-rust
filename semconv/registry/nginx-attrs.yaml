# ngx-otel-rust — custom semconv attribute registry: nginx.* namespace
#
# These are NGINX-specific attributes emitted by the ngx-otel-rust module
# that are not yet (or may never be) in the upstream OTel semconv registry.
#
# Extends OTel semconv v1.29.0 (pinned; see weaver.yaml).
# Machine-readable companion to TELEMETRY_MODEL.md.
#
# Lint: weaver registry check --registry semconv/registry

groups:

  # ── nginx.upstream.zone ─────────────────────────────────────────────────────
  - id: registry.nginx.upstream
    type: attribute_group
    display_name: NGINX upstream attributes
    brief: Attributes related to NGINX upstream groups.
    attributes:
      - id: nginx.upstream.zone
        type: string
        stability: experimental
        brief: >
          Name of the nginx upstream zone as declared by the `zone` directive
          in the `upstream {}` block.
        note: >
          Used as a per-dimension attribute on the
          `http.server.request.duration.by_upstream` exponential histogram series
          (TELEMETRY_MODEL.md §upstream). Cardinality is bounded (≤ 32 zones +
          an `"other"` overflow slot + a `""` no-upstream sentinel).
        examples: ['api_backends', 'static_files_zone', 'upstream_pool']

  # ── nginx.error.* ────────────────────────────────────────────────────────────
  - id: registry.nginx.error
    type: attribute_group
    display_name: NGINX error-log attributes
    brief: >
      Attributes on `nginx.error` LogRecords emitted by the ngx-otel-rust
      error-log coalescer (§6.6.2).
    attributes:
      - id: nginx.error.template_hash
        type: int
        stability: experimental
        brief: >
          Stable 32-bit hash of the nginx error-log *template*: the stable
          core of the log line with variable parts (addresses, counts, filenames)
          replaced by placeholders. Used to group repeated identical errors
          into a coalesced count.
        note: >
          Two LogRecords with the same `nginx.error.template_hash` emitted in
          the same interval represent the same error class; the
          `nginx.error.coalesced_count` attribute carries the repeat count.
        examples: [2157895461, 3914042817]
      - id: nginx.error.coalesced_count
        type: int
        stability: experimental
        brief: >
          Number of identical (same template) nginx error-log events that were
          coalesced into this single LogRecord during the current export interval.
        note: >
          Present only when the count is greater than 1.  Absent (or 1) means
          the record is verbatim — no coalescing occurred.  Requires
          `otel_error_log_coalesce on` (the default).
        examples: [42, 1000, 5]
