# Weaver configuration for ngx-otel-rust custom semconv registry.
#
# Pins the upstream OTel semconv version this registry extends, so lint
# results are reproducible across Weaver upgrades.
#
# Tool: weaver v0.23.0  (https://github.com/open-telemetry/weaver)
# Semconv: https://github.com/open-telemetry/semantic-conventions (tag v1.29.0)
#
# Usage:
#   weaver registry check --registry semconv/registry
#
# Report-only live-check (fail-on: none — not a blocking gate; see plan 3.7):
#   weaver live-check \
#     --registry semconv/registry \
#     --fail-on none \
#     --grpc-endpoint 127.0.0.1:4317

semconv_version: "1.29.0"
