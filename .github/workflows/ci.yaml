name: CI

# Mirrors nginx/ngx-rust's ci.yaml posture: fmt + clippy (default lint set,
# denied as errors — NOT pedantic) on an MSRV + stable matrix, plus a
# cargo-deny dependency-policy gate. Integration and ThreadSanitizer gates run
# on dedicated hosts (see HANDOFF.md infra discipline), not here.
#
# PREREQUISITES (must be configured once for the lint-and-test job to go green):
#   * Secret NGX_RUST_CHECKOUT_TOKEN — a PAT/token with read access to the
#     private CVanF5/ngx-rust fork (the module depends on it via a `../ngx-rust`
#     path dependency). The default GITHUB_TOKEN only grants access to THIS repo.
#   * NGINX_VERSION below must match the nginx source the module is built/tested
#     against (currently 1.31.1, per nginx/src/core/nginx.h in the sibling tree).
# The `fmt` and `cargo-deny` jobs need neither and run standalone.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "--deny warnings"
  RUSTDOCFLAGS: "--deny warnings"
  NGINX_VERSION: "1.31.1"
  NGX_RUST_REF: "ngx-otel-rust-deadlock-fix"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  lint-and-test:
    name: clippy + unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # MSRV floor (Cargo.toml rust-version) + current stable.
        rust: ["1.85.0", "stable"]
    steps:
      - name: Checkout module
        uses: actions/checkout@v4
        with:
          path: ngx-otel-rust

      - name: Checkout ngx-rust fork (sibling ../ngx-rust)
        uses: actions/checkout@v4
        with:
          repository: CVanF5/ngx-rust
          ref: ${{ env.NGX_RUST_REF }}
          token: ${{ secrets.NGX_RUST_CHECKOUT_TOKEN }}
          path: ngx-rust

      - name: Fetch nginx source (sibling ../nginx)
        run: |
          curl -fsSL "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz" -o nginx.tar.gz
          mkdir -p nginx
          tar -xzf nginx.tar.gz --strip-components=1 -C nginx

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler libclang-dev clang \
            libpcre2-dev zlib1g-dev libssl-dev

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ngx-otel-rust

      - name: make check (fmt --check + clippy -D warnings)
        working-directory: ngx-otel-rust
        run: make check

      - name: make unittest
        working-directory: ngx-otel-rust
        run: make unittest
