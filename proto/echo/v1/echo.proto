syntax = "proto3";

package ngx.otel.echo.v1;

// Local-only bidi test proto.  Mechanical exercise of the gRPC bridge.
// NOT an OTel protocol; will be replaced when OTAP firms up.
service Echo {
    // Client streams Ping messages; server streams Pong replies.
    // Server emits one Pong per Ping received, with seq == ping.seq.
    rpc BidiEcho (stream Ping) returns (stream Pong);
}

message Ping {
    uint64 seq = 1;
    bytes payload = 2;
}

message Pong {
    uint64 seq = 1;
    bytes payload = 2;
}
